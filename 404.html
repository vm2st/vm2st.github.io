<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление на vm2studios.github.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #f5f7fe 0%, #e9eefa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
        }
        .redirect-card {
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            padding: 2.5rem 2rem;
            max-width: 540px;
            text-align: center;
            animation: fadeScale 0.3s ease;
        }
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .main-message {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1a2c3e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .loader-dots {
            display: inline-flex;
            gap: 0.2rem;
        }
        .loader-dots span {
            width: 8px;
            height: 8px;
            background-color: #2c6e9e;
            border-radius: 50%;
            display: inline-block;
            animation: dotPulse 1.4s infinite ease-in-out both;
        }
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotPulse {
            0%,80%,100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1.1); opacity: 1; }
        }
        .small-note {
            font-size: 0.85rem;
            color: #4a5b6e;
            margin-top: 1.2rem;
            border-top: 1px solid #dfe6ef;
            padding-top: 1.2rem;
        }
        .small-note a {
            color: #1f6392;
            text-decoration: none;
            border-bottom: 1px dashed #8bb3cc;
        }
        .small-note a:hover {
            color: #0e3b58;
            border-bottom-style: solid;
        }
        .redirect-icon {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #859aae;
        }
    </style>
</head>
<body>
<div class="redirect-card">
    <div class="redirect-icon">🔄</div>
    <div class="main-message">
        Идёт перенаправление на новый домен...
        <span class="loader-dots"><span></span><span></span><span></span></span>
    </div>
    <div class="small-note">
        🔗 Если этого не произошло — 
        <a href="#" id="manualLink">нажмите сюда</a>
    </div>
    <footer>автоматический переход через секунду</footer>
</div>

<script>
    (function() {
        const NEW_DOMAIN = "https://vm2studios.github.io";
        let targetUrl = NEW_DOMAIN;

        // Определяем протокол: file: или http/https
        const isFileProtocol = window.location.protocol === 'file:';

        if (!isFileProtocol) {
            // Открыто через веб-сервер (GitHub Pages или локальный сервер)
            let currentPath = window.location.pathname;   // например: /mon  или /minsan/
            let currentSearch = window.location.search;
            let currentHash = window.location.hash;
            // Убираем возможный дублирующий слэш
            if (currentPath && !currentPath.startsWith('/')) {
                currentPath = '/' + currentPath;
            }
            targetUrl = NEW_DOMAIN + currentPath + currentSearch + currentHash;
        } else {
            // Открыто локально (file://) – перенаправляем только на главную,
            // так как локальный путь не существует на сервере
            targetUrl = NEW_DOMAIN + '/';
        }

        // Функция редиректа (замена в истории)
        function performRedirect() {
            window.location.replace(targetUrl);
        }

        // Обновляем ссылку "нажмите сюда"
        const manualLink = document.getElementById('manualLink');
        if (manualLink) {
            manualLink.href = targetUrl;
            manualLink.addEventListener('click', function(event) {
                event.preventDefault();
                window.location.replace(targetUrl);
            });
        }

        // Мгновенный редирект (с микро-задержкой для отображения сообщения)
        setTimeout(performRedirect, 0);

        // Резервный редирект через 1.2 секунды
        let fallbackTriggered = false;
        setTimeout(function() {
            if (!fallbackTriggered && window.location.hostname !== "vm2studios.github.io") {
                fallbackTriggered = true;
                window.location.href = targetUrl;
            }
        }, 1200);
    })();
</script>
</body>
</html>
